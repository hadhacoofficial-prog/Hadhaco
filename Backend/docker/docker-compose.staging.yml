version: "3.9"

# Staging overrides — run with:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.staging.yml up -d
services:
  api:
    env_file: ../.env.staging
    environment:
      APP_ENV: staging
    deploy:
      resources:
        limits:
          memory: 512M
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--workers", "2",
        "--proxy-headers",
        "--forwarded-allow-ips", "*",
      ]

  redis:
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
