version: "3.9"

services:
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../.env
    command: ["python", "-m", "alembic", "-c", "alembic/alembic.ini", "upgrade", "head"]
    restart: "no"
    networks:
      - hadha-net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      # Override REDIS_URL so it uses the Docker service name and optional auth.
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hadha-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Optional auth: set REDIS_PASSWORD to enable --requirepass at startup.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - >-
        exec redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        $${REDIS_PASSWORD:+--requirepass $${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    networks:
      - hadha-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $${REDIS_PASSWORD}} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - hadha-net

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hadha-net

volumes:
  redis_data:

networks:
  hadha-net:
    driver: bridge
