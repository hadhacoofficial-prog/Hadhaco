name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check app tests --output-format=github

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests -v --cov=app --cov-report=term-missing
      - name: Compile check
        run: python -m compileall -q app

  sql-sanity:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hadha_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Create auth schema stub (Supabase-managed in production)
        run: |
          psql postgresql://postgres:postgres@localhost:5432/hadha_ci -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
              id UUID PRIMARY KEY,
              email TEXT,
              raw_user_meta_data JSONB DEFAULT '{}'
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS UUID
              LANGUAGE sql STABLE AS 'SELECT NULL::uuid';
          SQL
      - name: Apply full schema (setup.sql)
        working-directory: supabase/sql
        run: psql postgresql://postgres:postgres@localhost:5432/hadha_ci -v ON_ERROR_STOP=1 -f setup.sql
      - name: Re-run setup.sql (idempotency check)
        working-directory: supabase/sql
        run: psql postgresql://postgres:postgres@localhost:5432/hadha_ci -v ON_ERROR_STOP=1 -f setup.sql

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
