# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name admin.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Admin portal ──────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name admin.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hadha.co/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.razorpay.com; img-src 'self' data: https://cdn.hadha.co blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.hadha.co https://*.supabase.co; upgrade-insecure-requests" always;

    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|webp|gif|avif)$ {
        proxy_pass http://frontend:3000;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Root redirect — admin panel lives at /admin/login
    location = / {
        return 301 https://admin.hadha.co/admin;
    }

    # Pass all /admin/* routes through to the frontend SSR
    location ^~ /admin {
        proxy_pass http://frontend:3000;
        proxy_read_timeout 30s;
    }

    # Redirect customer-facing routes that land on admin domain back to the customer site
    location / {
        return 301 https://hadha.co$request_uri;
    }

    location ~* \.(env|git|htaccess|htpasswd|log|sh|sql|bak|backup|swp|ini|config)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
