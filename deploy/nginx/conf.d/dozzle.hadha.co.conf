# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name dozzle.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Dozzle log viewer ─────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name dozzle.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hadha.co/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;

    # Authentication is handled by Dozzle itself via DOZZLE_AUTH_PROVIDER=simple
    # and a users.yml file generated by deploy.sh from GitHub Secrets.

    location / {
        proxy_pass http://dozzle:8080/;
        proxy_read_timeout 300s;

        # Required for Dozzle SSE (server-sent events log streaming)
        proxy_buffering           off;
        proxy_cache               off;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
