# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name redis.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Redis Commander ───────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name redis.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hadha.co/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;

    # Authentication is handled by Redis Commander itself via HTTP_USER / HTTP_PASSWORD
    # environment variables injected from GitHub Secrets at deploy time.

    location / {
        proxy_pass http://redis-commander:8081/;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
