# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name errors.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── GlitchTip error tracking ──────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name errors.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hadha.co/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;

    client_max_body_size 50m;

    location / {
        proxy_pass http://glitchtip:8000/;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
