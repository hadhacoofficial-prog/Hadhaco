# ── HTTP → HTTPS redirect (staging — port 8880) ───────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name staging.hadha.co;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Staging HTTPS server ─────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name staging.hadha.co;

    # ── SSL certificates ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/staging.hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.hadha.co/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/staging.hadha.co/chain.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=3600" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Robots-Tag              "noindex, nofollow" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend:8000/api/;
        proxy_read_timeout 120s;
        access_log /var/log/nginx/api_access.log main;
    }

    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8000/api/v1/auth/;
    }

    location /api/v1/media/ {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 20m;
        proxy_pass http://backend:8000/api/v1/media/;
        proxy_read_timeout 120s;
    }

    # ── Backend health ────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # ── Monitoring — Dozzle (basic auth required) ─────────────────────────
    location /dozzle/ {
        auth_basic           "Hadha Staging Monitoring";
        auth_basic_user_file /etc/nginx/htpasswd;

        proxy_pass http://dozzle:8080/dozzle/;
        proxy_read_timeout 300s;
        proxy_buffering           off;
        proxy_cache               off;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
    }

    # ── Monitoring — Redis Commander (basic auth required) ────────────────
    location /redis-commander/ {
        auth_basic           "Hadha Staging Redis Admin";
        auth_basic_user_file /etc/nginx/htpasswd;
        proxy_pass http://redis-commander:8081/redis-commander/;
    }

    # ── Frontend SSR ─────────────────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|webp|gif|avif)$ {
        proxy_pass http://frontend:3000;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_read_timeout 30s;
    }

    location ~* \.(env|git|htaccess|htpasswd|log|sh|sql|bak|backup|swp|ini|config)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
