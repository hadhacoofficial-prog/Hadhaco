# ── Default server / internal health check endpoint ──────────────────────────
#
# Named 00-health.conf so it is the first file loaded from conf.d/*.conf
# (alphabetical order). Nginx assigns this block as the default_server for
# port 80, meaning any request whose Host header does not match a configured
# server_name is handled here.
#
# WHY THIS FILE EXISTS
# --------------------
# Every other port-80 block redirects to HTTPS. When the Docker healthcheck,
# the deployment script, or an uptime monitor probes http://127.0.0.1/ (or
# any raw IP), the Host header is the IP address, which matches no domain.
# Without this block, Nginx would use whichever conf.d file comes first
# alphabetically (admin.hadha.co.conf), redirect to https://127.0.0.1/, and
# fail TLS verification — the certificate covers hadha.co domains, not IPs.
#
# The /nginx-health location returns 200 OK over plain HTTP with no redirect.
# This is the same pattern used by Kubernetes liveness probes, AWS ALB, GCP
# Load Balancer, and Azure Application Gateway.
#
# USED BY
# -------
#   - Docker healthcheck (inside hadha-nginx container)
#   - deploy/scripts/healthcheck.sh (from VPS host via published port 80)
#   - GitHub Actions deployment pipeline (via healthcheck.sh)
#   - External uptime monitors probing http://<vps-ip>/nginx-health

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # Let's Encrypt ACME challenges must be here too: certbot may attempt
    # renewal for a new subdomain before its server_name block exists.
    location /.well-known/acme-challenge/ {
        root  /var/www/certbot;
        allow all;
    }

    # Dedicated health check endpoint — plain HTTP, no redirect, no TLS.
    # Returns 200 OK immediately. Safe to probe from:
    #   http://127.0.0.1/nginx-health       (inside container / VPS host)
    #   http://<vps-public-ip>/nginx-health (external monitors)
    location = /nginx-health {
        access_log  off;
        add_header  Content-Type  text/plain  always;
        return 200  "OK\n";
    }

    # Drop all other requests to the default server (unknown Host headers,
    # IP-based scans, etc.). 444 closes the connection without a response —
    # correct production behaviour: no information disclosure, no redirect.
    location / {
        return 444;
    }
}
