# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name api.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── FastAPI backend ───────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name api.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hadha.co/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Auth endpoints — stricter rate limit (brute-force protection)
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8000/api/v1/auth/;
        proxy_read_timeout 30s;
        access_log /var/log/nginx/api_access.log main;
    }

    # Upload endpoints
    location /api/v1/media/ {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 20m;
        proxy_pass http://backend:8000/api/v1/media/;
        proxy_read_timeout 120s;
        access_log /var/log/nginx/api_access.log main;
    }

    # Health check — unauthenticated, not rate-limited
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # All other API routes
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend:8000/;
        proxy_read_timeout 120s;
        access_log /var/log/nginx/api_access.log main;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
