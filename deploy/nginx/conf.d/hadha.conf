# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name hadha.co www.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://hadha.co$request_uri;
    }
}

# ── www → apex redirect ───────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;

    return 301 https://hadha.co$request_uri;
}

# ── Customer website ──────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hadha.co/chain.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://cdn.razorpay.com; frame-src https://api.razorpay.com; img-src 'self' data: https://cdn.hadha.co blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.hadha.co https://*.supabase.co https://api.resend.com; upgrade-insecure-requests" always;

    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|webp|gif|avif)$ {
        proxy_pass http://storefront:3000;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Admin routes belong on admin.hadha.co — redirect to enforce subdomain separation
    location ^~ /admin {
        return 301 https://admin.hadha.co$request_uri;
    }

    # SEO: sitemap proxied from the backend (uses settings.FRONTEND_URL for canonical URLs)
    location = /sitemap.xml {
        proxy_pass http://backend:8000/api/v1/sitemap.xml;
        proxy_set_header Host api.hadha.co;
    }

    # SEO: robots.txt served directly — disallow private customer paths
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nAllow: /\nDisallow: /account\nDisallow: /cart\nDisallow: /checkout\nDisallow: /wishlist\nSitemap: https://hadha.co/sitemap.xml\n";
    }

    location / {
        proxy_pass http://storefront:3000;
        proxy_read_timeout 30s;
    }

    location ~* \.(env|git|htaccess|htpasswd|log|sh|sql|bak|backup|swp|ini|config)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
