# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name hadha.co www.hadha.co;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name hadha.co;

    # ── SSL certificates (Let's Encrypt via certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hadha.co/chain.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://cdn.razorpay.com; frame-src https://api.razorpay.com; img-src 'self' data: https://cdn.hadha.co blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://api.resend.com; upgrade-insecure-requests" always;

    # ── API proxy ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend:8000/api/;
        proxy_read_timeout 120s;

        access_log /var/log/nginx/api_access.log main;
    }

    # ── Auth endpoint — stricter rate limit (must be before /api/) ────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8000/api/v1/auth/;
    }

    # ── Upload endpoint ───────────────────────────────────────────────────
    location /api/v1/media/ {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 20m;
        proxy_pass http://backend:8000/api/v1/media/;
        proxy_read_timeout 120s;
    }

    # ── Backend health (unauthenticated, rate-limited) ────────────────────
    location /health {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # ── Monitoring — Dozzle (basic auth required) ─────────────────────────
    location /dozzle/ {
        auth_basic           "Hadha Monitoring";
        auth_basic_user_file /etc/nginx/htpasswd;

        proxy_pass http://dozzle:8080/dozzle/;
        proxy_read_timeout 300s;

        # Required for Dozzle SSE (server-sent events log streaming)
        proxy_buffering           off;
        proxy_cache               off;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
    }

    # ── Monitoring — Redis Commander (basic auth required) ────────────────
    location /redis-commander/ {
        auth_basic           "Hadha Redis Admin";
        auth_basic_user_file /etc/nginx/htpasswd;

        proxy_pass http://redis-commander:8081/redis-commander/;
    }

    # ── Static assets — long cache, immutable ────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|webp|gif|avif)$ {
        proxy_pass http://frontend:3000;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Frontend SSR ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_read_timeout 30s;
    }

    # ── Block common attack patterns ─────────────────────────────────────
    location ~* \.(env|git|htaccess|htpasswd|log|sh|sql|bak|backup|swp|ini|config)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}

# ── Redirect www → apex ────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;

    return 301 https://hadha.co$request_uri;
}
