# ── Brotli Compression ─────────────────────────────────────────────────────
# Provides 15-25% better compression than gzip for text-based assets.
# Requires ngx_http_brotli_module. Gzip (configured in nginx.conf) serves
# as automatic fallback for clients that don't support Brotli.
# Remove this file to disable Brotli entirely.
brotli            on;
brotli_comp_level 6;
brotli_min_length 256;
brotli_proxied    any;
brotli_vary       on;
brotli_types
    application/javascript
    application/json
    application/xml
    application/rss+xml
    font/truetype
    font/opentype
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml
    text/html;
