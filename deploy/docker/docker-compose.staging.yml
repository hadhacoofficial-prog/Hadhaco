name: hadha-staging

# ─────────────────────────────────────────────────────────────────────────────
# Staging — mirrors production but with reduced resources and staging configs.
# Image tags use the develop branch SHA:
#   BACKEND_IMAGE  — ghcr.io/hadhacoofficial-prog/hadha-backend:develop-abc1234
#   FRONTEND_IMAGE — ghcr.io/hadhacoofficial-prog/hadha-frontend:develop-abc1234
# ─────────────────────────────────────────────────────────────────────────────

services:

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: hadha-staging-backend
    restart: unless-stopped
    env_file: /opt/hadha-staging/.env.staging
    environment:
      APP_ENV: staging
      # Include Redis password in URL — overrides env_file value
      REDIS_URL: "redis://:${REDIS_PASSWORD}@hadha-staging-redis:6379/0"
      ALLOWED_ORIGINS: "https://staging.hadha.co"
      ALLOWED_HOSTS: "staging.hadha.co"
    expose:
      - "8000"
    depends_on:
      hadha-staging-redis:
        condition: service_healthy
    networks:
      - hadha-staging-internal
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: hadha-staging-frontend
    restart: unless-stopped
    env_file: /opt/hadha-staging/.env.frontend.staging
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hadha-staging-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"

  hadha-staging-redis:
    image: redis:7-alpine
    container_name: hadha-staging-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    environment:
      # Expose password as env var so CMD-SHELL healthcheck can expand it
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_staging_data:/data
    networks:
      - hadha-staging-internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis-commander:
    image: rediscommander/redis-commander:0.8.0
    container_name: hadha-staging-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "staging:hadha-staging-redis:6379:0:${REDIS_PASSWORD}"
      URL_PREFIX: /redis-commander
    expose:
      - "8081"
    depends_on:
      hadha-staging-redis:
        condition: service_healthy
    networks:
      - hadha-staging-internal

  dozzle:
    image: amir20/dozzle:v8
    container_name: hadha-staging-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_BASE: /dozzle
      DOZZLE_NO_ANALYTICS: "true"
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hadha-staging-internal

  nginx:
    image: nginx:1.27-alpine
    container_name: hadha-staging-nginx
    restart: unless-stopped
    ports:
      - "8443:443"
      - "8880:80"
    volumes:
      - /opt/hadha-staging/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/hadha-staging/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/hadha-staging/nginx/htpasswd:/etc/nginx/htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hadha-staging-internal

volumes:
  redis_staging_data:
    name: hadha_staging_redis_data

networks:
  hadha-staging-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
