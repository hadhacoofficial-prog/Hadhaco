name: hadha-production

# =============================================================================
# All image tags are injected at deploy time via environment variables passed
# through `docker compose --env-file /opt/hadha/.env.production`:
#
#   BACKEND_IMAGE  — ghcr.io/hadhacoofficial-prog/hadha-backend:<tag>
#   FRONTEND_IMAGE — ghcr.io/hadhacoofficial-prog/hadha-frontend:<tag>
#   REDIS_PASSWORD — Redis authentication password
#
# The network (hadha-internal) is declared external so deploy.sh owns its
# lifecycle. This prevents `docker compose down` from ever deleting it, which
# would disconnect the migration container from Redis between deployments.
#
# Traffic flow: internet → nginx:80/443 → backend:8000 / frontend:3000
# Monitoring:   nginx → redis.hadha.co → redis-commander:8081
#               nginx → dozzle.hadha.co → dozzle:8080
# =============================================================================

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required — pass via --env-file}
    container_name: hadha-backend
    restart: unless-stopped
    env_file: /opt/hadha/.env.production
    environment:
      APP_ENV: production
      REDIS_URL: "redis://:${REDIS_PASSWORD}@hadha-redis:6379/0"
      ALLOWED_ORIGINS: "https://hadha.co,https://www.hadha.co,https://admin.hadha.co"
      # hadha-backend allows the SSR frontend container to call the backend
      # directly over the Docker-internal network without being rejected by
      # TrustedHostMiddleware (Node.js fetch sets Host to the URL hostname).
      ALLOWED_HOSTS: "api.hadha.co,hadha-backend"
    expose:
      - "8000"
    depends_on:
      hadha-redis:
        condition: service_healthy
    networks:
      - hadha-internal
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
    healthcheck:
      # Sends correct Host header so TrustedHostMiddleware does not reject
      # the request with 400 Invalid host header.
      test:
        [
          "CMD", "python", "-c",
          "import httpx,sys; r=httpx.get('http://localhost:8000/health/live',headers={'Host':'api.hadha.co'},timeout=5); sys.exit(0 if r.status_code<400 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  # ── React / TanStack Start frontend ─────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required — pass via --env-file}
    container_name: hadha-frontend
    restart: unless-stopped
    env_file: /opt/hadha/.env.frontend.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      # SSR loaders call this URL directly over the Docker-internal network.
      # Must NOT be exposed to the browser — browser uses VITE_API_BASE_URL
      # (baked at build time via Dockerfile ARG) which goes through nginx.
      SERVER_API_BASE_URL: "http://hadha-backend:8000/api/v1"
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hadha-internal
    healthcheck:
      test:
        [
          "CMD", "curl", "-sf",
          "--max-time", "5",
          "http://localhost:3000"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  # ── Redis ────────────────────────────────────────────────────────────────────
  hadha-redis:
    image: redis:7-alpine
    container_name: hadha-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --loglevel notice
    environment:
      # Expose password as env var so CMD-SHELL healthcheck can expand $$REDIS_PASSWORD
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - hadha-internal
    healthcheck:
      # $$REDIS_PASSWORD expands to the container env var (double $ escapes compose interpolation)
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ── Redis Commander ──────────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hadha-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "hadha:hadha-redis:6379:0:${REDIS_PASSWORD}"
      # Credentials injected from GitHub Secrets via deploy.sh — never stored in repo
      HTTP_USER: ${REDIS_UI_USERNAME}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD}
    expose:
      - "8081"
    depends_on:
      hadha-redis:
        condition: service_healthy
    networks:
      - hadha-internal
    healthcheck:
      # C-2 FIX: --server-response is GNU wget only. redis-commander runs on
      # Node.js (node:alpine) so node is always present. Use it to make an HTTP
      # request that validates the status code is not a 5xx server error.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:8081/',function(r){process.exit(r.statusCode<500?0:1)}).on('error',function(){process.exit(1)})"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  # ── Dozzle ───────────────────────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:v8
    container_name: hadha-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      # deploy.sh generates /opt/hadha/dozzle/users.yml (bcrypt-hashed) from
      # GitHub Secrets before compose up. Dozzle reads it as the user store.
      DOZZLE_AUTH_PROVIDER: simple
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/hadha/dozzle:/data:ro
    networks:
      - hadha-internal
    healthcheck:
      # C-2 FIX: --server-response is BusyBox-unsupported. Dozzle v8 ships a
      # /dozzle healthcheck subcommand in the same binary — this is the official
      # method used in dozzle's own Dockerfile HEALTHCHECK instruction.
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: hadha-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/hadha/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/hadha/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - hadha-internal
    healthcheck:
      # Two-stage check:
      #   1. nginx -t  — config is syntactically valid
      #   2. wget      — nginx process is listening and returning HTTP responses
      # nginx -t alone does NOT verify that the daemon is running and listening.
      #
      # C-2 FIX: --server-response is GNU wget only; nginx:stable-alpine uses
      # BusyBox wget which does not support it (grep would never match → always
      # fails). Use wget -q -O /dev/null with --no-check-certificate so the
      # request succeeds even when port 80 redirects to HTTPS (the TLS cert is
      # for hadha.co, not localhost — without --no-check-certificate BusyBox
      # wget would fail SSL verification on the redirect target).
      test:
        [
          "CMD-SHELL",
          "nginx -t 2>/dev/null && wget -q -O /dev/null --no-check-certificate http://127.0.0.1:80/ 2>/dev/null"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
    name: hadha_redis_data
  nginx_logs:
    name: hadha_nginx_logs

networks:
  hadha-internal:
    # external: true means Docker Compose will never create or delete this
    # network. deploy.sh creates it explicitly before compose up, and it
    # survives docker compose down. This protects Redis data continuity
    # and prevents accidental network recreation during rolling deployments.
    external: true
    name: hadha-internal
