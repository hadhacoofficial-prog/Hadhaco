# Promtail configuration for Hadha.co
# Collects Docker container logs and ships them to Loki.
# Works for both local (project=hadha) and production (project=hadha-production).

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://hadha-loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker container logs (universal — all containers) ─────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        # NO filter — collect ALL containers on this Docker daemon.
        # Both local (hadha) and production (hadha-production) are captured.
    relabel_configs:
      # Only keep hadha-* containers
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?hadha-.*"
        action: keep
      # Use container name as the primary label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # Compose service name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      # Compose project
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "project"
      # Container ID (short)
      - source_labels: ["__meta_docker_container_id"]
        regex: "(.{12}).*"
        target_label: "container_id"
      # Container image name
      - source_labels: ["__meta_docker_container_image"]
        target_label: "image"
      # Drop promtail's own logs to avoid feedback loops
      - source_labels: ["__meta_docker_container_name"]
        regex: "hadha-promtail"
        action: drop

    pipeline_stages:
      # ── Backend (FastAPI / structlog JSON) ─────────────────────────────────
      - match:
          selector: '{service="backend"}'
          stages:
            - json:
                expressions:
                  level: level
                  event: event
                  message: message
            - labels:
                level:
                event:

      # ── Generic Docker output log level detection ──────────────────────────
      - match:
          selector: '{container=~".+"}'
          stages:
            - regex:
                expression: '^(?P<level>(?i)(ERROR|WARN|INFO|DEBUG|FATAL|CRITICAL))'
            - labels:
                level:
            - drop:
                expression: "(?i)^DEBUG"
                older_than: 2h

      # ── Drop healthcheck noise from ALL services ───────────────────────────
      - match:
          selector: '{container=~"hadha-nginx"}'
          stages:
            - drop:
                expression: '.*nginx-health.*'

      - match:
          selector: '{container=~"hadha-backend"}'
          stages:
            - drop:
                expression: '.*GET /health.*'
            - drop:
                expression: '.*GET /health/live.*'
            - drop:
                expression: '.*GET /health/ready.*'

      - match:
          selector: '{container=~"hadha-prometheus|hadha-loki|hadha-node-exporter|hadha-cadvisor"}'
          stages:
            - drop:
                expression: '.*wget.*'

      - match:
          selector: '{container=~"hadha-grafana"}'
          stages:
            - drop:
                expression: '.*GET /api/health.*'
            - drop:
                expression: '.*GET /metrics.*'

      - match:
          selector: '{container=~"hadha-redis-exporter"}'
          stages:
            - drop:
                expression: '.*GET /health.*'

      - match:
          selector: '{container=~"hadha-glitchtip"}'
          stages:
            - drop:
                expression: '.*GET /_health/.*'
            - drop:
                expression: '.*GET /health.*'
