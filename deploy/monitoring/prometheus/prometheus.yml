# Prometheus configuration for Hadha.co
#
# Scraped services (container names are the same in local + production):
#   FastAPI        → hadha-backend:8000
#  Redis Exporter → hadha-redis-exporter:9121
#   Node Exporter  → hadha-node-exporter:9100
#   cAdvisor       → hadha-cadvisor:8080
#   Loki           → hadha-loki:3100

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s
  external_labels:
    cluster: "hadha-production"

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ── Backend (FastAPI + prometheus-fastapi-instrumentator) ─────────────────
  - job_name: "hadha-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["hadha-backend:8000"]
        labels:
          service: "backend"
    # Exclude /metrics and /health endpoints from request metrics
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "python_.*"
        action: drop

  # ── Redis ─────────────────────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["hadha-redis-exporter:9121"]
        labels:
          service: "redis"

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ── Node Exporter (host metrics) ──────────────────────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["hadha-node-exporter:9100"]
        labels:
          service: "node-exporter"
    # Drop high-cardinality filesystem and network metrics we don't use
    metric_relabel_configs:
      # Drop per-device filesystem metrics — we only need root mount
      - source_labels: [__name__, mountpoint]
        regex: "node_filesystem_.*;/(sys|proc|dev|host|etc|boot).*"
        action: drop
      # Drop TCP state metrics (high cardinality, rarely needed)
      - source_labels: [__name__]
        regex: "node_netstat_.*"
        action: drop
      # Drop conntrack metrics
      - source_labels: [__name__]
        regex: "node_nf_conntrack_.*"
        action: drop

  # ── cAdvisor (container metrics) ──────────────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["hadha-cadvisor:8080"]
        labels:
          service: "cadvisor"
    # Filter cAdvisor metrics to reduce cardinality and storage
    metric_relabel_configs:
      # Drop per-container CPU throttling metrics (rarely needed)
      - source_labels: [__name__]
        regex: "container_cpu_cfs_throttled_.*"
        action: drop
      # Drop per-container task state metrics (not reliable in cAdvisor)
      - source_labels: [__name__]
        regex: "container_tasks_.*"
        action: drop
      # Drop container filesystem metrics (high cardinality, redundant with node)
      - source_labels: [__name__]
        regex: "container_fs_.*"
        action: drop
      # Drop container_blkio metrics (high cardinality)
      - source_labels: [__name__]
        regex: "container_blkio_.*"
        action: drop
      # Drop container_scrape_error (always 0 when working)
      - source_labels: [__name__]
        regex: "container_scrape_error"
        action: drop
      # Drop labels that add cardinality but no value
      - source_labels: [name]
        regex: ".*"
        target_label: __tmp_name
        action: replace
      # Keep only essential labels
      - regex: "id"
        action: labeldrop
      - regex: "image"
        action: labeldrop
      - regex: "compose_service"
        action: labeldrop
      - regex: "compose_project"
        action: labeldrop

  # ── Loki (log aggregation self-monitoring) ────────────────────────────────
  - job_name: "loki"
    static_configs:
      - targets: ["hadha-loki:3100"]
        labels:
          service: "loki"

  # ── Promtail (log shipping metrics) ──────────────────────────────────────
  - job_name: "promtail"
    static_configs:
      - targets: ["hadha-promtail:9080"]
        labels:
          service: "promtail"
