# Alert rules for Hadha.co
# Fires alerts when critical thresholds are breached.

groups:
  # ── Infrastructure alerts ──────────────────────────────────────────────────
  - name: hadha_infrastructure
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} target {{ $labels.instance }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute."

      - alert: HighCPUUsage
        expr: host:cpu_usage:percent > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage is above 90%"
          description: "CPU usage has been {{ printf \"%.1f\" $value }}% for 5 minutes."

      - alert: HighMemoryUsage
        expr: host:memory_usage:percent > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is above 85%"
          description: "Memory usage has been {{ printf \"%.1f\" $value }}% for 5 minutes."

      - alert: DiskSpaceLow
        expr: host:disk_usage:percent > 85
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk space is running low"
          description: "Disk usage is {{ printf \"%.1f\" $value }}% — less than 15% free."

      - alert: DiskSpaceCritical
        expr: host:disk_usage:percent > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low"
          description: "Disk usage is {{ printf \"%.1f\" $value }}% — immediate action required."

  # ── Application alerts ─────────────────────────────────────────────────────
  - name: hadha_application
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: job:http_errors:error_ratio5m > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "5xx error rate above 5%"
          description: "Error ratio is {{ printf \"%.2f\" $value }} ({{ printf \"%.1f\" $value }}%) over the last 5 minutes."

      - alert: HighLatencyP95
        expr: job:http_request_duration_seconds:p95 > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 API latency above 2 seconds"
          description: "P95 latency is {{ printf \"%.2f\" $value }}s for the last 5 minutes."

      - alert: HighLatencyP99
        expr: job:http_request_duration_seconds:p99 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "P99 API latency above 5 seconds"
          description: "P99 latency is {{ printf \"%.2f\" $value }}s for the last 5 minutes."

      - alert: FrontendErrorsHigh
        expr: sum(rate(http_requests_total{handler=~"/.*",status=~"5.."}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frontend 5xx error rate is elevated"
          description: "{{ printf \"%.2f\" $value }} req/s returning 5xx errors."

  # ── Redis alerts ───────────────────────────────────────────────────────────
  - name: hadha_redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is unreachable"
          description: "Redis exporter has been unable to connect for more than 1 minute."

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 90%"
          description: "Redis is using {{ printf \"%.1f\" $value }}% of its configured maxmemory."

      - alert: RedisHighEviction
        expr: rate(redis_evicted_keys_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis key eviction rate is high"
          description: "{{ printf \"%.1f\" $value }} keys/second being evicted — increase maxmemory or optimize memory usage."

      - alert: RedisLowHitRate
        expr: redis:hit_ratio:ratio < 0.8
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Redis cache hit rate below 80%"
          description: "Hit rate is {{ printf \"%.1f\" $value }}% — cache may need tuning."

  # ── Container alerts ───────────────────────────────────────────────────────
  - name: hadha_container
    interval: 30s
    rules:
      - alert: ContainerHighCPU
        expr: container:cpu_usage:percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} CPU usage above 80%"
          description: "CPU usage is {{ printf \"%.1f\" $value }}%."

      - alert: ContainerHighMemory
        expr: >
          container_memory_usage_bytes{name=~"hadha-.*"}
          / container_spec_memory_limit_bytes{name=~"hadha-.*"}
          > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory usage above 90% of limit"
          description: "Memory is {{ printf \"%.1f\" $value }}% of its configured limit."

      - alert: ContainerRestarted
        expr: increase(container_restart_count{name=~"hadha-.*"}[1h]) > 3
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restarted {{ $value }} times in 1h"
          description: "Excessive restarts indicate a crash loop or OOM."

  # ── Loki / Promtail alerts ────────────────────────────────────────────────
  - name: hadha_logs
    interval: 30s
    rules:
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Loki is unreachable"
          description: "Loki has been down for more than 1 minute — logs are not being ingested."

      - alert: PromtailErrorsHigh
        expr: rate(promtail_targets_failed_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Promtail is failing to scrape targets"
          description: "{{ printf \"%.1f\" $value }} targets failing."
