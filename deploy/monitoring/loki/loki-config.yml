# Loki configuration for Hadha.co
# Single-binary mode with local filesystem storage.
# Retention: 7 days (tuned for 4 vCPU / 8 GB RAM server).
# Max disk: ~2 GB (chunks limited by compactor retention).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_server_max_concurrent_streams: 500

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
    heartbeat_timeout: 1m

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h  # 7 days
  max_query_length: 721h
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  per_stream_rate_limit: 2MB
  per_stream_rate_limit_burst: 8MB
  max_entries_limit_per_query: 5000
  max_query_parallelism: 4
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 15m

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 50

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
