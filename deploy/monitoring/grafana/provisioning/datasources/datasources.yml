# Grafana auto-provisioned data sources for Hadha.co

apiVersion: 1

datasources:
  # ── Prometheus ──────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://hadha-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "30s"
      httpMethod: POST

  # ── Loki ───────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://hadha-loki:3100
    editable: false
    jsonData:
      maxLines: 1000
