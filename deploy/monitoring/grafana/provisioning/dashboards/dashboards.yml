# Grafana auto-provisioned dashboard configuration for Hadha.co

apiVersion: 1

providers:
  - name: "Hadha.co"
    orgId: 1
    folder: "Hadha.co"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
