name: Production Deploy

# Triggers on pushes to main.
# Builds multi-arch images, pushes to GHCR with SHA + semver tags,
# then deploys to the production VPS with full rollback support.

on:
  push:
    branches: [main]
  # Allow manual trigger with optional tag override
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (leave empty to build from HEAD)"
        required: false
        default: ""

concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel in-flight production deployments

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  # Hardcoded org — never use github.repository_owner which can shift if the repo is forked
  BACKEND_IMAGE_NAME: hadhacoofficial-prog/hadha-backend
  STOREFRONT_IMAGE_NAME: hadhacoofficial-prog/hadha-storefront
  ADMIN_IMAGE_NAME: hadhacoofficial-prog/hadha-admin

jobs:
  # ── Run all CI checks first ───────────────────────────────────────────────
  ci:
    name: CI Validation
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Detect version ────────────────────────────────────────────────────────
  version:
    name: Resolve Version
    runs-on: ubuntu-24.04
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
      semver: ${{ steps.version.outputs.semver }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
            echo "Using manually specified tag: ${TAG}"
          else
            SHORT_SHA="${GITHUB_SHA::8}"
            TAG="sha-${SHORT_SHA}"
          fi

          # Detect semver tag if current commit is tagged
          SEMVER=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")

          echo "image_tag=${TAG}"    >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}"    >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG} (semver: ${SEMVER:-none})"

  # ── Build and push images ─────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-24.04
    needs: [ci, version]
    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.tags.outputs.backend_image }}
      storefront_image: ${{ steps.tags.outputs.storefront_image }}
      admin_image: ${{ steps.tags.outputs.admin_image }}
      image_tag: ${{ needs.version.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute full image tag list
        id: tags
        run: |
          TAG="${{ needs.version.outputs.image_tag }}"
          SEMVER="${{ needs.version.outputs.semver }}"
          BACKEND_BASE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}"
          STOREFRONT_BASE="${{ env.REGISTRY }}/${{ env.STOREFRONT_IMAGE_NAME }}"
          ADMIN_BASE="${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE_NAME }}"

          BACKEND_TAGS="${BACKEND_BASE}:${TAG},${BACKEND_BASE}:latest"
          STOREFRONT_TAGS="${STOREFRONT_BASE}:${TAG},${STOREFRONT_BASE}:latest"
          ADMIN_TAGS="${ADMIN_BASE}:${TAG},${ADMIN_BASE}:latest"

          if [[ -n "${SEMVER}" ]]; then
            BACKEND_TAGS="${BACKEND_TAGS},${BACKEND_BASE}:${SEMVER}"
            STOREFRONT_TAGS="${STOREFRONT_TAGS},${STOREFRONT_BASE}:${SEMVER}"
            ADMIN_TAGS="${ADMIN_TAGS},${ADMIN_BASE}:${SEMVER}"
          fi

          echo "backend_tags=${BACKEND_TAGS}"                >> "$GITHUB_OUTPUT"
          echo "storefront_tags=${STOREFRONT_TAGS}"          >> "$GITHUB_OUTPUT"
          echo "admin_tags=${ADMIN_TAGS}"                    >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_BASE}:${TAG}"        >> "$GITHUB_OUTPUT"
          echo "storefront_image=${STOREFRONT_BASE}:${TAG}"  >> "$GITHUB_OUTPUT"
          echo "admin_image=${ADMIN_BASE}:${TAG}"            >> "$GITHUB_OUTPUT"
          echo "Primary backend image:    ${BACKEND_BASE}:${TAG}"
          echo "Primary storefront image: ${STOREFRONT_BASE}:${TAG}"
          echo "Primary admin image:      ${ADMIN_BASE}:${TAG}"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/docker/Dockerfile
          target: production
          push: true
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,mode=max,scope=backend-prod
          tags: ${{ steps.tags.outputs.backend_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ needs.version.outputs.semver || needs.version.outputs.image_tag }}

      - name: Build and push storefront
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend_whole
          file: ./Frontend_whole/storefront/Dockerfile
          target: production
          push: true
          cache-from: type=gha,scope=storefront-prod
          cache-to: type=gha,mode=max,scope=storefront-prod
          build-args: |
            NITRO_PRESET=node
            NODE_ENV=production
            VITE_API_BASE_URL=https://api.hadha.co/api/v1
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          tags: ${{ steps.tags.outputs.storefront_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ needs.version.outputs.semver || needs.version.outputs.image_tag }}

      - name: Build and push admin
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend_whole
          file: ./Frontend_whole/admin/Dockerfile
          target: production
          push: true
          cache-from: type=gha,scope=admin-prod
          cache-to: type=gha,mode=max,scope=admin-prod
          build-args: |
            NITRO_PRESET=node
            NODE_ENV=production
            VITE_API_BASE_URL=https://api.hadha.co/api/v1
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          tags: ${{ steps.tags.outputs.admin_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ needs.version.outputs.semver || needs.version.outputs.image_tag }}

  # ── Verify GHCR image propagation ────────────────────────────────────────
  # WHY THIS JOB EXISTS:
  #   docker build-push-action returns success when GHCR's origin server
  #   accepts the manifest. GHCR's CDN is eventually consistent — edge nodes
  #   serving the VPS region may not have replicated the manifest yet.
  #   Without this gate, deploy-production starts immediately and the VPS
  #   hits "manifest unknown" or EOF on docker pull.
  #
  #   This job logs in to GHCR fresh (simulating the VPS registry view) and
  #   calls docker buildx imagetools inspect with exponential backoff until
  #   ALL manifests are confirmed readable. Deployment is blocked until then.
  verify-images:
    name: Verify GHCR Image Propagation
    runs-on: ubuntu-24.04
    needs: build-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all image manifests are retrievable
        env:
          BACKEND_IMAGE: ${{ needs.build-push.outputs.backend_image }}
          STOREFRONT_IMAGE: ${{ needs.build-push.outputs.storefront_image }}
          ADMIN_IMAGE: ${{ needs.build-push.outputs.admin_image }}
        run: |
          MAX_RETRIES=10
          # Backoff delays in seconds: 5 10 20 30 60 60 60 60 60 (9 delays for 10 attempts)
          BACKOFFS=(5 10 20 30 60 60 60 60 60)

          verify_manifest() {
            local image="$1"
            local label="$2"
            local attempt=0

            echo "━━ Verifying ${label} manifest: ${image}"

            while (( attempt < MAX_RETRIES )); do
              (( attempt++ ))
              echo "  Attempt ${attempt}/${MAX_RETRIES} [$(date +'%H:%M:%S')]"

              local output exit_code
              set +e
              output=$(docker buildx imagetools inspect "${image}" 2>&1)
              exit_code=$?
              set -e

              if [[ ${exit_code} -eq 0 ]]; then
                echo "  ✓ ${label} manifest confirmed"
                # Print digest line for traceability in the Actions log
                echo "${output}" | grep -E "^Name:|^Digest:|MediaType:" | head -5 || true
                return 0
              fi

              echo "  Not yet available — response: $(echo "${output}" | head -2 | tr '\n' '|')"

              if (( attempt >= MAX_RETRIES )); then
                echo "  ✗ ${label} manifest unavailable after ${MAX_RETRIES} attempts"
                echo "  The push succeeded but GHCR propagation is stalled."
                echo "  Action: re-run this workflow. The images ARE in GHCR."
                return 1
              fi

              local delay="${BACKOFFS[$((attempt - 1))]}"
              echo "  Waiting ${delay}s before attempt $((attempt + 1))/${MAX_RETRIES}..."
              sleep "${delay}"
            done
            return 1
          }

          # Verify ALL manifests before allowing deployment.
          # Partial deployment (e.g. new backend + old storefront) is worse than no-op.
          BACKEND_OK=true
          STOREFRONT_OK=true
          ADMIN_OK=true

          verify_manifest "${BACKEND_IMAGE}"    "backend"    || BACKEND_OK=false
          verify_manifest "${STOREFRONT_IMAGE}" "storefront" || STOREFRONT_OK=false
          verify_manifest "${ADMIN_IMAGE}"      "admin"      || ADMIN_OK=false

          echo ""
          echo "  Backend    manifest : ${BACKEND_OK}"
          echo "  Storefront manifest : ${STOREFRONT_OK}"
          echo "  Admin      manifest : ${ADMIN_OK}"

          if [[ "${BACKEND_OK}" != "true" ]] || [[ "${STOREFRONT_OK}" != "true" ]] || [[ "${ADMIN_OK}" != "true" ]]; then
            echo "✗ One or more manifests unavailable — deployment blocked."
            exit 1
          fi

          echo "✓ All manifests confirmed. Deployment may now begin."

  # ── Deploy to production VPS ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    needs: [version, build-push, verify-images]
    environment:
      name: production
      url: https://hadha.co
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy artifacts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Copy entire deploy/ directory so conf.d/ is included recursively
          source: "deploy/"
          target: "/tmp/hadha-deploy"
          strip_components: 0

      - name: Deploy
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ needs.build-push.outputs.backend_image }}
          STOREFRONT_IMAGE: ${{ needs.build-push.outputs.storefront_image }}
          ADMIN_IMAGE: ${{ needs.build-push.outputs.admin_image }}
          IMAGE_TAG: ${{ needs.version.outputs.image_tag }}
          GHCR_USERNAME: hadhacoofficial-prog
          # GHCR_TOKEN must be a GitHub PAT with read:packages scope.
          # GITHUB_TOKEN is NOT valid for docker login on an external VPS.
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || 'workflow_dispatch' }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_UI_USERNAME: ${{ secrets.REDIS_UI_USERNAME }}
          REDIS_UI_PASSWORD: ${{ secrets.REDIS_UI_PASSWORD }}
          DOZZLE_USERNAME: ${{ secrets.DOZZLE_USERNAME }}
          DOZZLE_PASSWORD: ${{ secrets.DOZZLE_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          GRAFANA_USERNAME: ${{ secrets.GRAFANA_USERNAME }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          GLITCHTIP_DB_PASSWORD: ${{ secrets.GLITCHTIP_DB_PASSWORD }}
          GLITCHTIP_SECRET_KEY: ${{ secrets.GLITCHTIP_SECRET_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: BACKEND_IMAGE,STOREFRONT_IMAGE,ADMIN_IMAGE,IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,GIT_COMMIT_SHA,GIT_COMMIT_AUTHOR,REDIS_PASSWORD,REDIS_UI_USERNAME,REDIS_UI_PASSWORD,DOZZLE_USERNAME,DOZZLE_PASSWORD,RESEND_API_KEY,RESEND_FROM_EMAIL,RESEND_TO_EMAIL,GRAFANA_USERNAME,GRAFANA_PASSWORD,GLITCHTIP_DB_PASSWORD,GLITCHTIP_SECRET_KEY
          timeout: 600s
          command_timeout: 10m
          script: |
            set -euo pipefail

            # Install updated scripts and configs
            chmod +x /tmp/hadha-deploy/deploy/scripts/*.sh
            cp -f /tmp/hadha-deploy/deploy/scripts/*.sh                           /opt/hadha/scripts/
            cp -f /tmp/hadha-deploy/deploy/docker/docker-compose.production.yml   /opt/hadha/

            # Remove stale directories that should be files (from failed deploys)
            for f in /opt/hadha/dozzle/users.yml \
                     /opt/hadha/nginx/nginx.conf \
                     /opt/hadha/monitoring/prometheus/prometheus.yml \
                     /opt/hadha/monitoring/loki/loki-config.yml \
                     /opt/hadha/monitoring/promtail/promtail-config.yml; do
              if [ -d "$f" ]; then rmdir "$f" 2>/dev/null || rm -rf "$f" 2>/dev/null || echo "WARN: cannot remove $f (may need root)"; fi
            done

            # Install nginx configs — nginx.conf to root, conf.d/ for all server blocks
            cat /tmp/hadha-deploy/deploy/nginx/nginx.conf > /opt/hadha/nginx/nginx.conf
            mkdir -p /opt/hadha/nginx/conf.d
            for f in /tmp/hadha-deploy/deploy/nginx/conf.d/*.conf; do
              cat "$f" > "/opt/hadha/nginx/conf.d/$(basename "$f")"
            done

            # Install monitoring configs (prometheus, loki, promtail)
            mkdir -p /opt/hadha/monitoring/prometheus/rules
            cat /tmp/hadha-deploy/deploy/monitoring/prometheus/prometheus.yml > /opt/hadha/monitoring/prometheus/prometheus.yml
            for f in /tmp/hadha-deploy/deploy/monitoring/prometheus/rules/*.yml; do
              cat "$f" > "/opt/hadha/monitoring/prometheus/rules/$(basename "$f")"
            done
            mkdir -p /opt/hadha/monitoring/loki
            cat /tmp/hadha-deploy/deploy/monitoring/loki/loki-config.yml > /opt/hadha/monitoring/loki/loki-config.yml
            mkdir -p /opt/hadha/monitoring/promtail
            cat /tmp/hadha-deploy/deploy/monitoring/promtail/promtail-config.yml > /opt/hadha/monitoring/promtail/promtail-config.yml

            # Execute deployment — temp dir kept for deploy.sh fallback copies
            export BACKEND_IMAGE STOREFRONT_IMAGE ADMIN_IMAGE IMAGE_TAG
            export GHCR_USERNAME GHCR_TOKEN GIT_COMMIT_SHA GIT_COMMIT_AUTHOR
            export REDIS_PASSWORD RESEND_API_KEY RESEND_FROM_EMAIL RESEND_TO_EMAIL
            export REDIS_UI_USERNAME REDIS_UI_PASSWORD DOZZLE_USERNAME DOZZLE_PASSWORD
            export GRAFANA_USERNAME GRAFANA_PASSWORD GLITCHTIP_DB_PASSWORD GLITCHTIP_SECRET_KEY

            /opt/hadha/scripts/deploy.sh "${IMAGE_TAG}"

            rm -rf /tmp/hadha-deploy

      - name: Notify deployment failure (if SSH step failed)
        if: failure()
        run: |
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"${{ secrets.RESEND_FROM_EMAIL }}\",
              \"to\":   [\"${{ secrets.RESEND_TO_EMAIL }}\"],
              \"subject\": \"🔴 [PRODUCTION] GitHub Actions deployment failed\",
              \"html\": \"<p>The GitHub Actions deployment job itself failed (SSH or SCP step).</p><p>Commit: ${{ github.sha }}<br>Branch: ${{ github.ref_name }}<br>Actor: ${{ github.actor }}</p><p><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View run</a></p>\"
            }"
