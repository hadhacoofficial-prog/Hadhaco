name: Production Deploy

# Triggers on pushes to main.
# Builds multi-arch images, pushes to GHCR with SHA + semver tags,
# then deploys to the production VPS with full rollback support.
#
# Repository layout:
#   infrastructure/  — bootstrap, docker compose (infra), monitoring, nginx, ssl
#   application/     — docker compose (app)
#   deployment/      — deploy, rollback, verify, backup, restore, smoke-tests
#   monitoring/      — grafana dashboards, prometheus configs
#   Backend/         — Python FastAPI source
#   Frontend_whole/  — React monorepo (storefront + admin)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (leave empty to build from HEAD)"
        required: false
        default: ""

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: hadhacoofficial-prog/hadha-backend
  STOREFRONT_IMAGE_NAME: hadhacoofficial-prog/hadha-storefront
  ADMIN_IMAGE_NAME: hadhacoofficial-prog/hadha-admin

jobs:
  # ── Run all CI checks first ───────────────────────────────────────────────
  ci:
    name: CI Validation
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Detect version ────────────────────────────────────────────────────────
  version:
    name: Resolve Version
    runs-on: ubuntu-24.04
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}
      semver: ${{ steps.version.outputs.semver }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
            echo "Using manually specified tag: ${TAG}"
          else
            SHORT_SHA="${GITHUB_SHA::8}"
            TAG="sha-${SHORT_SHA}"
          fi

          SEMVER=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "")

          echo "image_tag=${TAG}"    >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}"    >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG} (semver: ${SEMVER:-none})"

  # ── Build and push images ─────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-24.04
    needs: [ci, version]
    permissions:
      contents: read
      packages: write

    outputs:
      backend_image: ${{ steps.tags.outputs.backend_image }}
      storefront_image: ${{ steps.tags.outputs.storefront_image }}
      admin_image: ${{ steps.tags.outputs.admin_image }}
      image_tag: ${{ needs.version.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute full image tag list
        id: tags
        run: |
          TAG="${{ needs.version.outputs.image_tag }}"
          SEMVER="${{ needs.version.outputs.semver }}"
          BACKEND_BASE="${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}"
          STOREFRONT_BASE="${{ env.REGISTRY }}/${{ env.STOREFRONT_IMAGE_NAME }}"
          ADMIN_BASE="${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE_NAME }}"

          BACKEND_TAGS="${BACKEND_BASE}:${TAG},${BACKEND_BASE}:latest"
          STOREFRONT_TAGS="${STOREFRONT_BASE}:${TAG},${STOREFRONT_BASE}:latest"
          ADMIN_TAGS="${ADMIN_BASE}:${TAG},${ADMIN_BASE}:latest"

          if [[ -n "${SEMVER}" ]]; then
            BACKEND_TAGS="${BACKEND_TAGS},${BACKEND_BASE}:${SEMVER}"
            STOREFRONT_TAGS="${STOREFRONT_TAGS},${STOREFRONT_BASE}:${SEMVER}"
            ADMIN_TAGS="${ADMIN_TAGS},${ADMIN_BASE}:${SEMVER}"
          fi

          echo "backend_tags=${BACKEND_TAGS}"                >> "$GITHUB_OUTPUT"
          echo "storefront_tags=${STOREFRONT_TAGS}"          >> "$GITHUB_OUTPUT"
          echo "admin_tags=${ADMIN_TAGS}"                    >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_BASE}:${TAG}"        >> "$GITHUB_OUTPUT"
          echo "storefront_image=${STOREFRONT_BASE}:${TAG}"  >> "$GITHUB_OUTPUT"
          echo "admin_image=${ADMIN_BASE}:${TAG}"            >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/docker/Dockerfile
          target: production
          push: true
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,mode=max,scope=backend-prod
          tags: ${{ steps.tags.outputs.backend_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ needs.version.outputs.semver || needs.version.outputs.image_tag }}

      - name: Build and push storefront
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend_whole
          file: ./Frontend_whole/storefront/Dockerfile
          target: production
          push: true
          cache-from: type=gha,scope=storefront-prod
          cache-to: type=gha,mode=max,scope=storefront-prod
          build-args: |
            NITRO_PRESET=node
            NODE_ENV=production
            VITE_API_BASE_URL=https://api.hadha.co/api/v1
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          tags: ${{ steps.tags.outputs.storefront_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ needs.version.outputs.semver || needs.version.outputs.image_tag }}

      - name: Build and push admin
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend_whole
          file: ./Frontend_whole/admin/Dockerfile
          target: production
          push: true
          cache-from: type=gha,scope=admin-prod
          cache-to: type=gha,mode=max,scope=admin-prod
          build-args: |
            NITRO_PRESET=node
            NODE_ENV=production
            VITE_API_BASE_URL=https://api.hadha.co/api/v1
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          tags: ${{ steps.tags.outputs.admin_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.version=${{ needs.version.outputs.semver || needs.version.outputs.image_tag }}

  # ── Verify GHCR image propagation ────────────────────────────────────────
  verify-images:
    name: Verify GHCR Image Propagation
    runs-on: ubuntu-24.04
    needs: build-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all image manifests are retrievable
        env:
          BACKEND_IMAGE: ${{ needs.build-push.outputs.backend_image }}
          STOREFRONT_IMAGE: ${{ needs.build-push.outputs.storefront_image }}
          ADMIN_IMAGE: ${{ needs.build-push.outputs.admin_image }}
        run: |
          MAX_RETRIES=10
          BACKOFFS=(5 10 20 30 60 60 60 60 60)

          verify_manifest() {
            local image="$1" label="$2" attempt=0
            echo "Verifying ${label} manifest: ${image}"

            while (( attempt < MAX_RETRIES )); do
              (( attempt++ ))
              echo "  Attempt ${attempt}/${MAX_RETRIES}"
              local output exit_code
              set +e
              output=$(docker buildx imagetools inspect "${image}" 2>&1)
              exit_code=$?
              set -e

              if [[ ${exit_code} -eq 0 ]]; then
                echo "  ${label} manifest confirmed"
                return 0
              fi

              if (( attempt >= MAX_RETRIES )); then
                echo "  ${label} manifest unavailable after ${MAX_RETRIES} attempts"
                return 1
              fi

              local delay="${BACKOFFS[$((attempt - 1))]}"
              echo "  Waiting ${delay}s..."
              sleep "${delay}"
            done
            return 1
          }

          BACKEND_OK=true; STOREFRONT_OK=true; ADMIN_OK=true
          verify_manifest "${BACKEND_IMAGE}"    "backend"    || BACKEND_OK=false
          verify_manifest "${STOREFRONT_IMAGE}" "storefront" || STOREFRONT_OK=false
          verify_manifest "${ADMIN_IMAGE}"      "admin"      || ADMIN_OK=false

          if [[ "${BACKEND_OK}" != "true" ]] || [[ "${STOREFRONT_OK}" != "true" ]] || [[ "${ADMIN_OK}" != "true" ]]; then
            echo "One or more manifests unavailable — deployment blocked."
            exit 1
          fi

          echo "All manifests confirmed. Deployment may now begin."

  # ── Deploy to production VPS ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    needs: [version, build-push, verify-images]
    environment:
      name: production
      url: https://hadha.co
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy artifacts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "Infra/"
          target: "/tmp/hadha-deploy"
          strip_components: 0

      - name: Deploy
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ needs.build-push.outputs.backend_image }}
          STOREFRONT_IMAGE: ${{ needs.build-push.outputs.storefront_image }}
          ADMIN_IMAGE: ${{ needs.build-push.outputs.admin_image }}
          IMAGE_TAG: ${{ needs.version.outputs.image_tag }}
          GHCR_USERNAME: hadhacoofficial-prog
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || 'workflow_dispatch' }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_UI_USERNAME: ${{ secrets.REDIS_UI_USERNAME }}
          REDIS_UI_PASSWORD: ${{ secrets.REDIS_UI_PASSWORD }}
          DOZZLE_USERNAME: ${{ secrets.DOZZLE_USERNAME }}
          DOZZLE_PASSWORD: ${{ secrets.DOZZLE_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          GRAFANA_USERNAME: ${{ secrets.GRAFANA_USERNAME }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          GLITCHTIP_DB_PASSWORD: ${{ secrets.GLITCHTIP_DB_PASSWORD }}
          GLITCHTIP_SECRET_KEY: ${{ secrets.GLITCHTIP_SECRET_KEY }}
          GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
          GLITCHTIP_FRONTEND_DSN: ${{ secrets.GLITCHTIP_FRONTEND_DSN }}
          MONITORING_USERNAME: ${{ secrets.MONITORING_USERNAME }}
          MONITORING_PASSWORD: ${{ secrets.MONITORING_PASSWORD }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: BACKEND_IMAGE,STOREFRONT_IMAGE,ADMIN_IMAGE,IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,GIT_COMMIT_SHA,GIT_COMMIT_AUTHOR,REDIS_PASSWORD,REDIS_UI_USERNAME,REDIS_UI_PASSWORD,DOZZLE_USERNAME,DOZZLE_PASSWORD,RESEND_API_KEY,RESEND_FROM_EMAIL,RESEND_TO_EMAIL,GRAFANA_USERNAME,GRAFANA_PASSWORD,GLITCHTIP_DB_PASSWORD,GLITCHTIP_SECRET_KEY,GLITCHTIP_DSN,GLITCHTIP_FRONTEND_DSN,MONITORING_USERNAME,MONITORING_PASSWORD
          timeout: 600s
          command_timeout: 10m
          script: |
            set -euo pipefail

            DEPLOY_SRC="/tmp/hadha-deploy"
            APP_DIR="/opt/hadha"

            echo "[$(date +'%H:%M:%S')] Syncing infrastructure configs..."

            # ── Deploy scripts ──────────────────────────────────────────────
            chmod +x "${DEPLOY_SRC}/Infra/deployment/"*.sh 2>/dev/null || true
            mkdir -p "${APP_DIR}/scripts"
            cp -f "${DEPLOY_SRC}/Infra/deployment/"*.sh "${APP_DIR}/scripts/" 2>/dev/null || true

            # ── Deploy infrastructure compose ───────────────────────────────
            cp -f "${DEPLOY_SRC}/Infra/infrastructure/docker/docker-compose.infrastructure.yml" "${APP_DIR}/"

            # ── Deploy application compose ──────────────────────────────────
            cp -f "${DEPLOY_SRC}/Infra/application/docker-compose.application.yml" "${APP_DIR}/"

            # ── Deploy nginx configs ────────────────────────────────────────
            mkdir -p "${APP_DIR}/nginx/conf.d"
            cp -f "${DEPLOY_SRC}/Infra/infrastructure/nginx/nginx.conf" "${APP_DIR}/nginx/nginx.conf"
            for f in "${DEPLOY_SRC}/Infra/infrastructure/nginx/conf.d/"*.conf; do
              [ -f "$f" ] && cp -f "$f" "${APP_DIR}/nginx/conf.d/$(basename "$f")"
            done

            # ── Deploy monitoring configs ───────────────────────────────────
            for subdir in prometheus loki promtail grafana; do
              if [ -d "${DEPLOY_SRC}/Infra/infrastructure/monitoring/${subdir}" ]; then
                mkdir -p "${APP_DIR}/monitoring/${subdir}"
                cp -rf "${DEPLOY_SRC}/Infra/infrastructure/monitoring/${subdir}/"* "${APP_DIR}/monitoring/${subdir}/" 2>/dev/null || true
              fi
            done

            # ── Deploy monitoring dashboards ────────────────────────────────
            mkdir -p "${APP_DIR}/monitoring/grafana/dashboards"
            if [ -d "${DEPLOY_SRC}/Infra/infrastructure/monitoring/grafana/dashboards" ]; then
              cp -f "${DEPLOY_SRC}/Infra/infrastructure/monitoring/grafana/dashboards/"*.json "${APP_DIR}/monitoring/grafana/dashboards/" 2>/dev/null || true
            fi

            # ── Remove stale directory mounts ───────────────────────────────
            for f in "${APP_DIR}/dozzle/users.yml" \
                     "${APP_DIR}/nginx/nginx.conf" \
                     "${APP_DIR}/monitoring/prometheus/prometheus.yml" \
                     "${APP_DIR}/monitoring/loki/loki-config.yml" \
                     "${APP_DIR}/monitoring/promtail/promtail-config.yml"; do
              if [ -d "$f" ]; then rm -rf "$f" 2>/dev/null || true; fi
            done

            # ── Ensure Docker network ───────────────────────────────────────
            docker network inspect hadha >/dev/null 2>&1 || \
              docker network create --driver bridge hadha 2>/dev/null || true

            # ── Ensure infrastructure is running ────────────────────────────
            echo "[$(date +'%H:%M:%S')] Ensuring infrastructure stack..."
            docker compose --env-file "${APP_DIR}/.env.production" \
              -f "${APP_DIR}/docker-compose.infrastructure.yml" \
              up -d --remove-orphans --pull never 2>&1 || true

            # ── Execute deployment ──────────────────────────────────────────
            echo "[$(date +'%H:%M:%S')] Executing deploy.sh..."
            export BACKEND_IMAGE STOREFRONT_IMAGE ADMIN_IMAGE IMAGE_TAG
            export GHCR_USERNAME GHCR_TOKEN GIT_COMMIT_SHA GIT_COMMIT_AUTHOR
            export REDIS_PASSWORD RESEND_API_KEY RESEND_FROM_EMAIL RESEND_TO_EMAIL
            export REDIS_UI_USERNAME REDIS_UI_PASSWORD DOZZLE_USERNAME DOZZLE_PASSWORD
            export GRAFANA_USERNAME GRAFANA_PASSWORD GLITCHTIP_DB_PASSWORD GLITCHTIP_SECRET_KEY
            export GLITCHTIP_DSN GLITCHTIP_FRONTEND_DSN
            export MONITORING_USERNAME MONITORING_PASSWORD

            "${APP_DIR}/scripts/deploy.sh" "${IMAGE_TAG}"

            rm -rf /tmp/hadha-deploy

      - name: Notify deployment failure (if SSH step failed)
        if: failure()
        run: |
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"${{ secrets.RESEND_FROM_EMAIL }}\",
              \"to\":   [\"${{ secrets.RESEND_TO_EMAIL }}\"],
              \"subject\": \"🔴 [PRODUCTION] GitHub Actions deployment failed\",
              \"html\": \"<p>The GitHub Actions deployment job itself failed (SSH or SCP step).</p><p>Commit: ${{ github.sha }}<br>Branch: ${{ github.ref_name }}<br>Actor: ${{ github.actor }}</p><p><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View run</a></p>\"
            }"
