name: CI

# Runs on all PRs and pushes to any branch.
# No deployment — validation only.

on:
  pull_request:
    branches: ["*"]
  push:
    # Exclude main — that branch runs CI via production.yml which calls this
    # workflow as a reusable workflow. Running it directly here too would
    # double the CI cost on every push to main.
    branches-ignore: [main]
    paths-ignore:
      - "*.md"
      - "Docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  # production.yml calls this as a reusable workflow
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend: lint + security + type check ─────────────────────────────────
  backend-lint:
    name: Backend — Lint & Security
    continue-on-error: true
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install ruff black mypy bandit pip-audit

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check --diff .

      - name: MyPy type check
        run: mypy app/ --ignore-missing-imports

      - name: Bandit security scan
        run: bandit -r app/ -x app/tests --severity-level medium

      - name: pip-audit dependency vulnerabilities
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-43012

  # ── Backend: tests + coverage ─────────────────────────────────────────────
  backend-tests:
    name: Backend — Tests (${{ matrix.python }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run tests with coverage
        env:
          APP_ENV: development
          APP_DEBUG: "true"
          SECRET_KEY: testsecretkey1234567890abcdef1234567890ab
          ENCRYPTION_KEY: ScMKcnTeUAIxkeKkhFe-n7BTVisJRW2qpeNc3vqdah0=
          ALLOWED_ORIGINS: http://localhost:3000
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_KEY: test_anon_key
          SUPABASE_ANON_KEY: test_anon_key
          SUPABASE_SERVICE_ROLE_KEY: test_service_role_key
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/hadha_test
          REDIS_URL: redis://localhost:6379/15
          CLOUDFLARE_ACCOUNT_ID: test_account
          CLOUDFLARE_R2_BUCKET: test-bucket
          CLOUDFLARE_R2_ACCESS_KEY: test_access_key
          CLOUDFLARE_R2_SECRET_KEY: test_secret_key
          CLOUDFLARE_R2_PUBLIC_URL: https://test.r2.dev
          CLOUDFLARE_R2_ENDPOINT: https://test.r2.cloudflarestorage.com
          RESEND_API_KEY: re_test_key
          EMAIL_FROM: noreply@test.hadha.co
          EMAIL_REPLY_TO: support@test.hadha.co
          SMS_ENABLED: "false"
          MSG91_API_KEY: ""
          MSG91_SENDER_ID: HADHA
          MSG91_TEMPLATE_ID: ""
          RAZORPAY_KEY_ID: rzp_test_key
          RAZORPAY_KEY_SECRET: rzp_test_secret
          RAZORPAY_WEBHOOK_SECRET: rzp_webhook_secret
          DELIVERY_ONE_BASE_URL: https://api.test.deliveryone.in
          DELIVERY_ONE_API_KEY: test_delivery_key
          DELIVERY_ONE_WEBHOOK_SECRET: do_webhook_secret
          FRONTEND_URL: http://localhost:3000
          ADMIN_URL: http://localhost:3001
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -v \
            --tb=short \
            2>&1 | tee pytest_output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-${{ matrix.python }}
          path: Backend/coverage.xml
          retention-days: 7

  # ── Frontend: install monorepo dependencies ────────────────────────────────
  # Single install step shared by lint/typecheck jobs via cache.
  frontend-install:
    name: Frontend — Install Dependencies
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend_whole/package-lock.json

      - name: Install monorepo dependencies
        working-directory: Frontend_whole
        run: npm ci --legacy-peer-deps

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            Frontend_whole/node_modules
            Frontend_whole/storefront/node_modules
            Frontend_whole/admin/node_modules
            Frontend_whole/packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('Frontend_whole/package-lock.json') }}

  # ── Frontend: lint + typecheck (storefront) ───────────────────────────────
  storefront-lint:
    name: Storefront — Lint & Typecheck
    runs-on: ubuntu-24.04
    needs: frontend-install
    defaults:
      run:
        working-directory: Frontend_whole

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend_whole/package-lock.json

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            Frontend_whole/node_modules
            Frontend_whole/storefront/node_modules
            Frontend_whole/admin/node_modules
            Frontend_whole/packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('Frontend_whole/package-lock.json') }}

      - name: ESLint
        run: npm -w storefront run lint

      - name: Prettier format check
        run: npm -w storefront run format:check

      - name: TypeScript type check
        run: npm -w storefront run typecheck

  # ── Frontend: lint + typecheck (admin) ────────────────────────────────────
  admin-lint:
    name: Admin — Lint & Typecheck
    runs-on: ubuntu-24.04
    needs: frontend-install
    defaults:
      run:
        working-directory: Frontend_whole

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend_whole/package-lock.json

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            Frontend_whole/node_modules
            Frontend_whole/storefront/node_modules
            Frontend_whole/admin/node_modules
            Frontend_whole/packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('Frontend_whole/package-lock.json') }}

      - name: ESLint
        run: npm -w admin run lint

      - name: Prettier format check
        run: npm -w admin run format:check

      - name: TypeScript type check
        run: npm -w admin run typecheck

  # ── Frontend: unit tests (storefront) ────────────────────────────────────
  storefront-tests:
    name: Storefront — Unit Tests
    runs-on: ubuntu-24.04
    needs: frontend-install
    defaults:
      run:
        working-directory: Frontend_whole

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend_whole/package-lock.json

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            Frontend_whole/node_modules
            Frontend_whole/storefront/node_modules
            Frontend_whole/admin/node_modules
            Frontend_whole/packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('Frontend_whole/package-lock.json') }}

      - name: Run Vitest
        run: npm -w storefront run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storefront-coverage
          path: storefront/coverage/
          retention-days: 7

  # ── Frontend: unit tests (admin) ─────────────────────────────────────────
  admin-tests:
    name: Admin — Unit Tests
    runs-on: ubuntu-24.04
    needs: frontend-install
    defaults:
      run:
        working-directory: Frontend_whole

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend_whole/package-lock.json

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            Frontend_whole/node_modules
            Frontend_whole/storefront/node_modules
            Frontend_whole/admin/node_modules
            Frontend_whole/packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('Frontend_whole/package-lock.json') }}

      - name: Run Vitest
        run: npm -w admin run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-coverage
          path: admin/coverage/
          retention-days: 7

  # ── Frontend: production build validation ─────────────────────────────────
  storefront-build:
    name: Storefront — Production Build
    runs-on: ubuntu-24.04
    needs: frontend-install
    defaults:
      run:
        working-directory: Frontend_whole

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend_whole/package-lock.json

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            Frontend_whole/node_modules
            Frontend_whole/storefront/node_modules
            Frontend_whole/admin/node_modules
            Frontend_whole/packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('Frontend_whole/package-lock.json') }}

      - name: Build (Nitro node preset)
        env:
          NITRO_PRESET: node
          NODE_ENV: production
          VITE_API_BASE_URL: https://api.hadha.co/api/v1
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key
        run: npm -w storefront run build

  admin-build:
    name: Admin — Production Build
    runs-on: ubuntu-24.04
    needs: frontend-install
    defaults:
      run:
        working-directory: Frontend_whole

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend_whole/package-lock.json

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            Frontend_whole/node_modules
            Frontend_whole/storefront/node_modules
            Frontend_whole/admin/node_modules
            Frontend_whole/packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('Frontend_whole/package-lock.json') }}

      - name: Build (Nitro node preset)
        env:
          NITRO_PRESET: node
          NODE_ENV: production
          VITE_API_BASE_URL: https://api.hadha.co/api/v1
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key
        run: npm -w admin run build

  # ── Docker: build validation (no push) ───────────────────────────────────
  docker-build-validate:
    name: Docker — Build Validation
    runs-on: ubuntu-24.04
    needs: [backend-lint, storefront-lint, admin-lint]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/docker/Dockerfile
          target: production
          push: false
          cache-from: type=gha,scope=backend-ci
          cache-to: type=gha,mode=max,scope=backend-ci
          tags: hadha-backend:ci-test

      - name: Build storefront image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend_whole
          file: ./Frontend_whole/storefront/Dockerfile
          target: production
          push: false
          cache-from: type=gha,scope=storefront-ci
          cache-to: type=gha,mode=max,scope=storefront-ci
          build-args: |
            NITRO_PRESET=node
            VITE_API_BASE_URL=https://api.hadha.co/api/v1
            VITE_SUPABASE_URL=https://placeholder.supabase.co
            VITE_SUPABASE_PUBLISHABLE_KEY=placeholder_anon_key
          tags: hadha-storefront:ci-test

      - name: Build admin image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend_whole
          file: ./Frontend_whole/admin/Dockerfile
          target: production
          push: false
          cache-from: type=gha,scope=admin-ci
          cache-to: type=gha,mode=max,scope=admin-ci
          build-args: |
            NITRO_PRESET=node
            VITE_API_BASE_URL=https://api.hadha.co/api/v1
            VITE_SUPABASE_URL=https://placeholder.supabase.co
            VITE_SUPABASE_PUBLISHABLE_KEY=placeholder_anon_key
          tags: hadha-admin:ci-test

  # ── E2E Playwright tests ──────────────────────────────────────────────────
  e2e-tests:
    name: Storefront — E2E Tests (Playwright)
    runs-on: ubuntu-24.04
    # Only run E2E on PRs targeting main to save CI minutes
    if: |
      github.event_name == 'pull_request' &&
      github.base_ref == 'main'
    needs: [storefront-build, docker-build-validate]
    defaults:
      run:
        working-directory: Frontend_whole/storefront

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend_whole/package-lock.json

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            Frontend_whole/node_modules
            Frontend_whole/storefront/node_modules
            Frontend_whole/admin/node_modules
            Frontend_whole/packages/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('Frontend_whole/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app for E2E
        env:
          NITRO_PRESET: node
          NODE_ENV: production
          VITE_API_BASE_URL: https://api.hadha.co/api/v1
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}
        run: npm run build

      - name: Start Redis
        working-directory: .
        run: |
          docker compose -f docker-compose.yml up -d hadha-redis
          sleep 5

      - name: Run Playwright E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_START_SERVER: "true"
          PORT: "3000"
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Frontend_whole/storefront/playwright-report/
          retention-days: 7

      - name: Stop services
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.yml down -v 2>/dev/null || true

  # ── CI gate — all jobs must pass ─────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-24.04
    needs:
      - backend-lint
      - backend-tests
      - storefront-lint
      - admin-lint
      - storefront-tests
      - admin-tests
      - storefront-build
      - admin-build
      - docker-build-validate
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          if echo "${results}" | grep -qE 'failure|cancelled'; then
            echo "One or more required jobs failed: ${results}"
            exit 1
          fi
          echo "All required jobs passed: ${results}"
