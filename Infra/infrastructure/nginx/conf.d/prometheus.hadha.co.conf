# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name prometheus.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Prometheus monitoring ────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prometheus.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;

    # ── Basic Auth ─────────────────────────────────────────
    auth_basic "Prometheus";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Security Headers ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $prometheus "prometheus:9090";

    # Block dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Federate endpoint ──────────────────────────────────
    location /federate {
        proxy_pass http://$prometheus/federate;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size 16k;
        proxy_buffers 16 16k;
    }

    location / {
        proxy_pass http://$prometheus;
    }
}
