# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hadha.co www.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── www → apex redirect ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;

    location / {
        return 301 https://hadha.co$request_uri;
    }
}

# ── Main storefront ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $storefront "hadha-storefront:3000";

    # ── Security Headers ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; media-src 'self' https://videos.pexels.com https://cdn.hadha.co; connect-src 'self' https://api.hadha.co https://*.supabase.co wss://*.supabase.co; frame-ancestors 'self';" always;

    # Block dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Static assets — immutable caching
    location /_next/static/ {
        proxy_pass http://$storefront;
        proxy_cache proxy_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /static/ {
        proxy_pass http://$storefront;
        proxy_cache proxy_cache;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SEO routes — no caching
    location = /robots.txt {
        proxy_pass http://$storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /sitemap.xml {
        proxy_pass http://$storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # All other requests
    location / {
        proxy_pass http://$storefront;
    }
}
