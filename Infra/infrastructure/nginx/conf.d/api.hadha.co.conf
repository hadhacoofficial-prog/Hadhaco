# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.hadha.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API server ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.hadha.co;

    ssl_certificate     /etc/letsencrypt/live/hadha.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hadha.co/privkey.pem;

    # ── Security Headers ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;

    # Block dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Auth rate limiting (10r/m) ─────────────────────────
    location /auth/ {
        limit_req zone=auth burst=3 nodelay;
        limit_conn connlimit 20;

        proxy_pass http://hadha-backend:8000;
    }

    # ── Upload rate limiting (20r/m) ───────────────────────
    location /upload/ {
        limit_req zone=upload burst=5 nodelay;
        limit_conn connlimit 20;
        client_max_body_size 50m;

        proxy_pass http://hadha-backend:8000;
        proxy_request_buffering off;
    }

    # ── General API rate limiting (60r/m) ──────────────────
    location / {
        limit_req zone=api burst=20 nodelay;
        limit_conn connlimit 20;

        # Large response buffers for API payloads
        proxy_buffer_size 16k;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;

        proxy_pass http://hadha-backend:8000;
    }
}
