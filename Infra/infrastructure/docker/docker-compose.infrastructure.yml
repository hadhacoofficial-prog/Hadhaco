name: hadha-infrastructure

# =============================================================================
# Infrastructure Stack — deployed once by bootstrap.sh, rarely restarted.
# Application services are in docker-compose.application.yml.
#
# Single external network: hadha (created by bootstrap.sh)
# All services bind to this network for inter-service communication.
# =============================================================================

services:

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: hadha-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/hadha/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/hadha/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/hadha/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - hadha
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nginx -t 2>/dev/null && wget -qO- http://127.0.0.1/nginx-health 2>/dev/null | grep -q '^OK'"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  # ── Redis ────────────────────────────────────────────────────────────────────
  hadha-redis:
    image: redis:7-alpine
    container_name: hadha-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
        --loglevel notice
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - hadha
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ── Redis Commander ──────────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hadha-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "hadha:hadha-redis:6379:0:${REDIS_PASSWORD}"
      HTTP_USER: ${REDIS_UI_USERNAME}
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD}
    expose:
      - "8081"
    depends_on:
      hadha-redis:
        condition: service_healthy
    networks:
      - hadha
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:8081/',function(r){process.exit(r.statusCode<500?0:1)}).on('error',function(){process.exit(1)})"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  # ── Redis Exporter — Prometheus metrics for Redis ──────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: hadha-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://hadha-redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    expose:
      - "9121"
    depends_on:
      hadha-redis:
        condition: service_healthy
    networks:
      - hadha
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"
    security_opt:
      - no-new-privileges:true

  # ── Dozzle ───────────────────────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:v8
    container_name: hadha-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_AUTH_PROVIDER: simple
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/hadha/dozzle:/data
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  # ── Prometheus — metrics collection ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: hadha-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=512MB"
      - "--storage.tsdb.wal-segment-size=32MB"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - /opt/hadha/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/hadha/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ── Grafana — dashboards & visualization ─────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: hadha-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USERNAME:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-hadha-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.hadha.co"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: "warn"
      GF_INSTALL_PLUGINS: ""
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "smtp.resend.com:587"
      GF_SMTP_USER: "resend"
      GF_SMTP_PASSWORD: "${RESEND_API_KEY}"
      GF_SMTP_FROM_ADDRESS: "${RESEND_FROM_EMAIL:-admin@hadha.co}"
      GF_SMTP_STARTTLS_POLICY: "MandatoryStartTLS"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - /opt/hadha/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/hadha/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ── Loki — log aggregation ───────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: hadha-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - /opt/hadha/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    expose:
      - "3100"
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ── Promtail — log collection agent ──────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: hadha-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /opt/hadha/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_positions:/run/promtail
    expose:
      - "9080"
    depends_on:
      loki:
        condition: service_started
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  # ── Node Exporter — host metrics ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: hadha-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host/root"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(sysfs|procfs|devpts|tmpfs|hugetlbfs|cgroup|cgroup2|overlay|fuse.*|nsfs|debugfs|pstore|securityfs|bpf|mqueue|autofs|tracefs|configfs|efivarfs|rpc_pipefs|nfsd)$"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    expose:
      - "9100"
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"
    security_opt:
      - no-new-privileges:true

  # ── cAdvisor — container metrics ─────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: hadha-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  # ── Uptime Kuma — uptime monitoring ──────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:2.0.2
    container_name: hadha-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    expose:
      - "3001"
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', r => { process.exit(r.statusCode >= 200 && r.statusCode < 400 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  # ── GlitchTip — error tracking (Sentry-compatible) ───────────────────────────
  glitchtip:
    image: glitchtip/glitchtip:6.2.2
    container_name: hadha-glitchtip
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@hadha-glitchtip-db:5432/glitchtip"
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY}"
      GLITCHTIP_DOMAIN: "https://errors.hadha.co"
      PORT: "8000"
      VALKEY_URL: "redis://:${REDIS_PASSWORD}@hadha-redis:6379/1"
    expose:
      - "8000"
    depends_on:
      hadha-glitchtip-db:
        condition: service_healthy
    networks:
      - hadha
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/_health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ── GlitchTip Worker — processes error events ────────────────────────────────
  glitchtip-worker:
    image: glitchtip/glitchtip:6.2.2
    container_name: hadha-glitchtip-worker
    command: /code/bin/run-worker.sh
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@hadha-glitchtip-db:5432/glitchtip"
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY}"
      GLITCHTIP_DOMAIN: "https://errors.hadha.co"
      PORT: "8000"
      VALKEY_URL: "redis://:${REDIS_PASSWORD}@hadha-redis:6379/1"
    depends_on:
      hadha-glitchtip-db:
        condition: service_healthy
    networks:
      - hadha
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  # ── GlitchTip PostgreSQL (dedicated, lightweight) ────────────────────────────
  hadha-glitchtip-db:
    image: postgres:16-alpine
    container_name: hadha-glitchtip-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD}
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - hadha
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

# ─────────────────────────────────────────────────────────────────────────────
# Volumes — marked external because they may have been created by a previous
# project name. Docker will reuse the existing volumes without warnings.
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
    external: true
    name: hadha_redis_data
  nginx_logs:
    external: true
    name: hadha_nginx_logs
  prometheus_data:
    external: true
    name: hadha_prometheus_data
  grafana_data:
    external: true
    name: hadha_grafana_data
  loki_data:
    external: true
    name: hadha_loki_data
  promtail_positions:
    external: true
    name: hadha_promtail_positions
  uptime_kuma_data:
    external: true
    name: hadha_uptime_kuma_data
  glitchtip_db_data:
    external: true
    name: hadha_glitchtip_db_data

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  hadha:
    external: true
    name: hadha
