server:
  http_listen_port: 9080

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://hadha-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["hadha-.*"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      - docker: {}

      - regex:
          expression: '(?P<level>(?i)(?:trace|debug|info|warn(?:ing)?|error|critical|fatal))'

      - labels:
          level:

      - replace:
          expression: '(?i)(?:trace|debug)'
          source: level
          replace: debug

      - replace:
          expression: '(?i)warn(?:ing)?'
          source: level
          replace: warn

      - replace:
          expression: '(?i)critical|fatal'
          source: level
          replace: error

      - drop:
          expression: '.*"path"\s*:\s*"/(health|healthcheck|health/ready)".*'
          older_than: 10s

      - drop:
          expression: '"GET /health(?:/ready)? HTTP/[^"]*" "200"'
          older_than: 10s

      - labelallow:
          - container
          - service
          - stream
          - level
