groups:
  - name: http_recording
    interval: 30s
    rules:
      - record: http_requests_total_rate5m
        expr: rate(http_requests_total[5m])

      - record: http_request_duration_seconds_p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))

      - record: http_request_duration_seconds_p99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

      - record: http_requests_by_status_rate5m
        expr: sum by (status) (rate(http_requests_total[5m]))

  - name: redis_recording
    interval: 30s
    rules:
      - record: redis_hit_ratio
        expr: >-
          rate(redis_keyspace_hits_total[5m])
          /
          (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))

  - name: host_recording
    interval: 30s
    rules:
      - record: host_cpu_utilization
        expr: >-
          1 - (
            avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))
          )

      - record: host_memory_utilization
        expr: >-
          1 - (
            node_memory_MemAvailable_bytes
            /
            node_memory_MemTotal_bytes
          )

      - record: host_disk_utilization
        expr: >-
          1 - (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          )
