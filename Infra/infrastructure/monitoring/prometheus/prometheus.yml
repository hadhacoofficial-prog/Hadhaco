global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: backend
    dns_sd_configs:
      - names:
          - hadha-backend
        type: A
        port: 8000
    metrics_path: /metrics
    scrape_interval: 30s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "http_request_duration_seconds_bucket"
        action: drop
      - source_labels: [__name__]
        regex: "http_request_duration_seconds_count"
        action: drop
      - source_labels: [__name__]
        regex: "http_request_duration_seconds_sum"
        action: drop
      - source_labels: [path]
        regex: "/api/v([0-9]+)/.*"
        target_label: path
        replacement: "/api/v${1}/*"
      - source_labels: [user_id]
        regex: ".+"
        action: labeldrop
      - source_labels: [request_id]
        regex: ".+"
        action: labeldrop

  - job_name: redis
    dns_sd_configs:
      - names:
          - hadha-redis-exporter
        type: A
        port: 9121
    scrape_interval: 30s

  - job_name: node
    dns_sd_configs:
      - names:
          - hadha-node-exporter
        type: A
        port: 9100
    scrape_interval: 30s
    metric_relabel_configs:
      - source_labels: [device]
        regex: ".+"
        target_label: device
        replacement: "${1}"

  - job_name: cadvisor
    dns_sd_configs:
      - names:
          - hadha-cadvisor
        type: A
        port: 8080
    scrape_interval: 30s
    metric_relabel_configs:
      - source_labels: [container_name]
        regex: "hadha-.*"
        action: keep

  - job_name: loki
    dns_sd_configs:
      - names:
          - hadha-loki
        type: A
        port: 3100
    scrape_interval: 30s
    metrics_path: /metrics

  - job_name: promtail
    dns_sd_configs:
      - names:
          - hadha-promtail
        type: A
        port: 9080
    scrape_interval: 30s
    metrics_path: /metrics
