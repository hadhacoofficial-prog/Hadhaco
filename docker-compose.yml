name: hadha

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development
    container_name: hadha-backend
    restart: unless-stopped
    env_file: ./Backend/.env
    environment:
      # Docker service-name overrides — take precedence over values in .env.
      REDIS_URL: redis://hadha-redis:6379/0
      # localhost:8080 = browser→frontend dev server (host-mapped port).
      # frontend:8080  = inter-container name, used by SSR/Nitro server calls.
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:5173,http://frontend:8080"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    volumes:
      # Hot-reload: mount source so Uvicorn's --reload picks up file changes.
      - ./Backend:/app
    ports:
      - "8000:8000"
    depends_on:
      hadha-redis:
        condition: service_healthy
    networks:
      - hadha-network
    # Fix for OSError: [Errno 101] Network is unreachable.
    # asyncpg resolves Supabase hostnames and may select an IPv6 (AAAA) address
    # first. Docker's bridge network has no IPv6 routing on WSL2/Windows, so the
    # kernel returns ENETUNREACH before the TCP handshake. Disabling IPv6 in this
    # container's network namespace forces IPv4-only DNS and connection attempts.
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React / TanStack Start frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: development
    container_name: hadha-frontend
    restart: unless-stopped
    env_file: ./Frontend/.env
    environment:
      # VITE_API_BASE_URL must resolve from the user's *browser*, which reaches
      # the backend through the host-mapped port 8000 — not through the Docker
      # service name (which is unreachable from outside the container network).
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      # Bind-mount source for Vite HMR hot reload.
      - ./Frontend:/app
      # Named volume keeps Docker-installed node_modules isolated from the host
      # filesystem, avoiding Windows↔Linux native binary mismatches.
      - frontend_node_modules:/app/node_modules
    ports:
      # @lovable.dev/vite-tanstack-config runs the Nitro dev server on port 8080.
      # Confirmed by "Local: http://localhost:8080/" in Vite startup logs and by
      # ALLOWED_ORIGINS=http://localhost:8080 already set in Backend/.env.
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - hadha-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  hadha-redis:
    image: redis:7-alpine
    container_name: hadha-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hadha-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Redis Commander — browser-based Redis GUI ────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hadha-redis-commander
    restart: unless-stopped
    environment:
      # Format: label:host:port  — host must be the Docker service name.
      REDIS_HOSTS: "hadha:hadha-redis:6379"
    ports:
      - "8082:8081"
    depends_on:
      hadha-redis:
        condition: service_healthy
    networks:
      - hadha-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Dozzle — real-time container log viewer ──────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hadha-network

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  frontend_node_modules:

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  hadha-network:
    driver: bridge
