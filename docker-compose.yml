name: hadha

# ─────────────────────────────────────────────────────────────────────────────
# Local development stack — all services on a single bridge network.
#
# Port map (host → container):
#   8000 → backend         FastAPI / uvicorn --reload
#   8080 → storefront      Vite dev server
#   8081 → admin           Vite dev server
#   6379 → redis           direct access for local debugging
#   8082 → redis-commander
#   8083 → dozzle
#
# Key design notes:
#   • storefront/admin both bind-mount ./Frontend_whole:/app so source edits
#     trigger hot-reload in both containers simultaneously.
#   • Named volumes shadow /app/node_modules so Linux-built native binaries
#     (esbuild, etc.) are never overwritten by the Windows host copy.
#   • SERVER_API_BASE_URL is injected here (not in .env) so the Nitro SSR
#     server calls the backend over the Docker-internal network, not localhost.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: development
    container_name: hadha-backend
    restart: unless-stopped
    env_file: ./Backend/.env
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:-}@hadha-redis:6379/0"
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:8081,http://localhost:5173,http://www.localhost:8080,http://www.localhost:8081,http://www.localhost:5173"
      ALLOWED_HOSTS: "localhost,127.0.0.1,hadha-backend"
    volumes:
      - ./Backend:/app
    ports:
      - "8000:8000"
    depends_on:
      hadha-redis:
        condition: service_healthy
    networks:
      - hadha-network
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Storefront — customer-facing (localhost:8080) ────────────────────────────
  storefront:
    build:
      context: ./Frontend_whole
      dockerfile: storefront/Dockerfile
      target: development
    container_name: hadha-storefront
    restart: unless-stopped
    env_file: ./Frontend_whole/storefront/.env
    environment:
      # Browser-side: resolved by the user's browser on the host
      VITE_API_BASE_URL: "http://localhost:8000/api/v1"
      # SSR-side: resolved inside the Docker network (overrides .env default)
      SERVER_API_BASE_URL: "http://hadha-backend:8000/api/v1"
    volumes:
      - ./Frontend_whole:/app
      # Named volume keeps Linux-built node_modules separate from Windows host copy
      - storefront_node_modules:/app/node_modules
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hadha-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Admin portal (localhost:8081) ─────────────────────────────────────────────
  admin:
    build:
      context: ./Frontend_whole
      dockerfile: admin/Dockerfile
      target: development
    container_name: hadha-admin
    restart: unless-stopped
    env_file: ./Frontend_whole/admin/.env
    environment:
      VITE_API_BASE_URL: "http://localhost:8000/api/v1"
      SERVER_API_BASE_URL: "http://hadha-backend:8000/api/v1"
    volumes:
      - ./Frontend_whole:/app
      - admin_node_modules:/app/node_modules
    ports:
      - "8081:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hadha-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  hadha-redis:
    image: redis:7-alpine
    container_name: hadha-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - >-
        exec redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        $${REDIS_PASSWORD:+--requirepass $${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hadha-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $${REDIS_PASSWORD}} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Redis Commander (localhost:8082) ──────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hadha-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "hadha:hadha-redis:6379:0:${REDIS_PASSWORD:-}"
    ports:
      - "8082:8081"
    depends_on:
      hadha-redis:
        condition: service_healthy
    networks:
      - hadha-network
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:8081/',function(r){process.exit(r.statusCode<500?0:1)}).on('error',function(){process.exit(1)})"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Dozzle — container log viewer (localhost:8083) ────────────────────────────
  dozzle:
    image: amir20/dozzle:v8
    container_name: hadha-dozzle
    restart: unless-stopped
    environment:
      DOZZLE_NO_ANALYTICS: "true"
    ports:
      - "8083:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hadha-network
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  # One volume per frontend service — shadows /app/node_modules so Linux-built
  # binaries are never merged with the Windows host copy on the bind-mount.
  storefront_node_modules:
  admin_node_modules:

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  hadha-network:
    driver: bridge
